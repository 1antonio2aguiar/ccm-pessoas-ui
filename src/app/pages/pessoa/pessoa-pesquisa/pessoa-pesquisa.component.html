<nb-card>
  <nb-card-header>
    <div class="header">
      <span>Pesquisa de Pessoas</span>
    </div>
  </nb-card-header>

  <nb-card-body>
    <div class="loading" *ngIf="isLoading">Carregando...</div>

      <ng2-smart-table
        [settings]="settings"
        [source]="source"
        (create)="onAdd()"
        (edit)="onEdit($event)"
        (delete)="onDelete($event)">
      </ng2-smart-table>
  </nb-card-body>
</nb-card>
